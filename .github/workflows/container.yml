name: Container Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  QUAY_IMAGE: quay.io/crunchtools/mcp-slack
  GHCR_IMAGE: ghcr.io/crunchtools/mcp-slack

jobs:
  build-and-push-quay:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.QUAY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build container image
        run: docker build -f Containerfile -t ${{ env.QUAY_IMAGE }}:build .

      - name: Tag and push
        if: github.event_name != 'pull_request'
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker tag ${{ env.QUAY_IMAGE }}:build "$tag"
            docker push "$tag"
          done

      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.QUAY_IMAGE }}:latest
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  build-and-push-ghcr:
    runs-on: ubuntu-latest
    needs: build-and-push-quay
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build container image
        run: docker build -f Containerfile -t ${{ env.GHCR_IMAGE }}:build .

      - name: Tag and push
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker tag ${{ env.GHCR_IMAGE }}:build "$tag"
            docker push "$tag"
          done
